---
name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  RUSTFLAGS: -Dwarnings

jobs:
  build-py:
    name: "Build python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Get changed files
        id: changes
        uses: dorny/paths-filter@0bc4621a3135347011ad047f9ecf449bf72ce2bd # v3.0.0
        with:
          filters: |
            python:
              - 'taskturbine-python/**'

      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # pin@v1
        if: steps.changes.outputs.python == 'true'
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
        if: steps.changes.outputs.python == 'true'

      - uses: astral-sh/setup-uv@5a7eac68fb9809dea845d802897dc5c723910fa3 # v7.1.3
        if: steps.changes.outputs.python == 'true'
        with:
          version: '0.8.2'
          enable-cache: true

      - name: Build python extension
        if: steps.changes.outputs.python == 'true'
        run: make build-py

      - name: Store build artifacts
        if: steps.changes.outputs.python == 'true'
        id: store-py
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: build-${{ github.sha }} 
          path: ./target/**

  build-rs:
    name: "Build rust"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # pin@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2

      - name: Build rust crates
        run: make build-rs

      - name: Store build artifacts
        id: store-rust
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: build-${{ github.sha }} 
          path: ./target/**

  lint-py:
    name: Lint python
    runs-on: ubuntu-latest
    needs: build-py
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Get changed files
        id: changes
        uses: dorny/paths-filter@0bc4621a3135347011ad047f9ecf449bf72ce2bd # v3.0.0
        with:
          filters: |
            python:
              - 'taskturbine-python/**'

      - name: Skip if no Python client changes
        if: steps.changes.outputs.python != 'true'
        run: echo "No Python client files changed, skipping tests"

      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # pin@v1
        if: steps.changes.outputs.python == 'true'
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
        if: steps.changes.outputs.python == 'true'

      - uses: astral-sh/setup-uv@5a7eac68fb9809dea845d802897dc5c723910fa3 # v7.1.3
        if: steps.changes.outputs.python == 'true'
        with:
          version: '0.8.2'
          enable-cache: true

      - name: Fetch build results
        if: steps.changes.outputs.python == 'true'
        id: store-py
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: build-${{ github.sha }}
          path: ./target/**

      - name: Run format checking
        if: steps.changes.outputs.python == 'true'
        run: make style-py

      - name: Run linting
        if: steps.changes.outputs.python == 'true'
        run: make lint-py


  lint-rs:
    name: Lint Rust
    runs-on: ubuntu-latest
    needs: build-rs
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Get changed files
        id: changes
        uses: dorny/paths-filter@0bc4621a3135347011ad047f9ecf449bf72ce2bd # v3.0.0
        with:
          list-files: json
          filters: |
            all:
              - added|modified: '**/*'

      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # pin@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2

      - name: Fetch build results
        id: build-rs
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: build-${{ github.sha }}
          path: ./target/**

      - name: Run format checking
        run: make style-rs

      - name: Run linting
        run: make lint-rs

  test-py:
    name: Python client tests
    runs-on: ubuntu-latest
    needs: build-py

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Get changed Python client files
        id: changes
        uses: dorny/paths-filter@0bc4621a3135347011ad047f9ecf449bf72ce2bd # v3.0.0
        with:
          filters: |
            python:
              - 'taskturbine-python/**'

      - name: Skip if no Python client changes
        if: steps.changes.outputs.python != 'true'
        run: echo "No Python client files changed, skipping tests"

      - name: Start PostgreSQL
        if: steps.changes.output != 'true'
        run: docker run --rm --name=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=taskturbine -p 5432:5432 -d postgres:latest

      - uses: astral-sh/setup-uv@5a7eac68fb9809dea845d802897dc5c723910fa3 # v7.1.3
        if: steps.changes.outputs.python == 'true'
        with:
          version: '0.8.2'
          enable-cache: true

      - name: Fetch build results
        if: steps.changes.outputs.python == 'true'
        id: store-py
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: build-${{ github.sha }}
          path: ./target/**

      - name: Run pytest with coverage
        if: steps.changes.outputs.python == 'true'
        run: make test-py
        env:
          TASKTURBINE_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/postgres"

  test-rs:
    name: Rust tests
    needs: build-rs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Start PostgreSQL
        # if: steps.changes.output != 'true'
        run: docker run --rm --name=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=taskturbine -p 5432:5432 -d postgres:latest

      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # pin@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - uses: swatinem/rust-cache@81d053bdb0871dcd3f10763c8cc60d0adc41762b # pin@v1
        with:
          key: ${{ github.job }}

      - name: Fetch build results
        id: store-rs
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: build-${{ github.sha }}
          path: ./target/**

      - name: Run tests
        run: make test-rs
        env:
          RUST_BACKTRACE: 1
          TASKTURBINE_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/postgres"

  run-examples-py:
    name: Run demo applications, and CLI tool to run a small no-op workload.
    runs-on: ubuntu-latest
    needs: build-py

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # pin@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - uses: swatinem/rust-cache@81d053bdb0871dcd3f10763c8cc60d0adc41762b # pin@v1
        with:
          key: ${{ github.job }}

      - name: Start PostgreSQL
        if: steps.changes.output != 'true'
        run: docker run --rm --name=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=taskturbine -p 5432:5432 -d postgres:latest

      - uses: astral-sh/setup-uv@5a7eac68fb9809dea845d802897dc5c723910fa3 # v7.1.3
        if: steps.changes.outputs.python == 'true'
        with:
          version: '0.8.2'
          enable-cache: true

      - name: Run examples application
        if: steps.changes.outputs.python == 'true'
        run: make test-examples-py
        env:
          TASKTURBINE_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/postgres"

