[package]
name = "taskturbine-core"
version = "0.1.0"
edition = "2024"

[dependencies]
figment = "0.10.19"
serde_json = "1.0.145"
sqlx = { version = "0.8.6", features = ["postgres", "runtime-tokio", "uuid"] }
tokio = { version = "1.48.0", features = ["full"] }
uuid = { version = "1.18.1", features = ["v7"] }
