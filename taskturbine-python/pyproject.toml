[project]
name = "taskturbine-python"
version = "0.1.0"
requires-python = ">3.13"
dependencies = [
    "maturin==1.3.0",
    "tomli==2.0.1",
]

[dependency-groups]
dev = [
    "maturin[patchelf]>=1.3.0",
    "black",
    "mypy",
    "pip",
    "pytest",
    "psycopg2-binary",
]

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[tool.maturin]
python-source = "python"

[tool.pytest.ini_options]
testpaths = ["python/tests"]
